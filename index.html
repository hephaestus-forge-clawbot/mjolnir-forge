<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚒️ MJOLNIR FORGE v5 — Multi-Universe Character Customizer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a1a;--bg2:#111128;--accent:#00d4ff;--accent2:#0088aa;
  --text:#e0e0e0;--panel:rgba(0,212,255,0.06);--border:rgba(0,212,255,0.25);
  --btn-bg:rgba(0,212,255,0.12);--btn-hover:rgba(0,212,255,0.25);
  --shadow:0 0 20px rgba(0,212,255,0.15);--glow:0 0 30px rgba(0,212,255,0.3);
}
[data-theme="peppa"]{
  --bg:#fff0f5;--bg2:#ffe8f0;--accent:#ff69b4;--accent2:#ff1493;
  --text:#5a2040;--panel:rgba(255,105,180,0.06);--border:rgba(255,105,180,0.25);
  --btn-bg:rgba(255,105,180,0.12);--btn-hover:rgba(255,105,180,0.25);
  --shadow:0 0 20px rgba(255,105,180,0.15);--glow:0 0 30px rgba(255,105,180,0.3);
}
[data-theme="bluey"]{
  --bg:#e6f2fd;--bg2:#d0e8f8;--accent:#4a90d9;--accent2:#f09030;
  --text:#1a3a5c;--panel:rgba(74,144,217,0.06);--border:rgba(74,144,217,0.25);
  --btn-bg:rgba(74,144,217,0.12);--btn-hover:rgba(74,144,217,0.25);
  --shadow:0 0 20px rgba(74,144,217,0.15);--glow:0 0 30px rgba(74,144,217,0.3);
}
[data-theme="rachel"]{
  --bg:#fffef2;--bg2:#fff5d6;--accent:#ff6b35;--accent2:#e74c3c;
  --text:#2c1810;--panel:rgba(255,107,53,0.06);--border:rgba(255,107,53,0.25);
  --btn-bg:rgba(255,107,53,0.12);--btn-hover:rgba(255,107,53,0.25);
  --shadow:0 0 20px rgba(255,107,53,0.15);--glow:0 0 30px rgba(255,107,53,0.3);
}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;
  transition:background .5s,color .5s;
}
.title-bar{text-align:center;padding:14px 10px 8px;background:var(--bg2);border-bottom:1px solid var(--border)}
.title-bar h1{font-size:22px;color:var(--accent);letter-spacing:3px;font-weight:900}
.title-bar .sub{font-size:11px;opacity:.5;margin-top:3px;letter-spacing:1px}
.header{display:flex;justify-content:center;gap:8px;padding:12px 10px;background:var(--bg2);border-bottom:2px solid var(--border);flex-wrap:wrap}
.mode-btn{
  padding:11px 22px;border:2px solid var(--border);background:var(--btn-bg);
  color:var(--text);font-size:15px;font-weight:700;border-radius:12px;
  cursor:pointer;transition:all .25s;display:flex;align-items:center;gap:8px;
  user-select:none;
}
.mode-btn:hover{background:var(--btn-hover);transform:translateY(-2px);box-shadow:var(--shadow)}
.mode-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:var(--glow)}
[data-theme="spartan"] .mode-btn.active,[data-theme="bluey"] .mode-btn.active{color:#000}
.mi{font-size:22px}
.main{display:flex;flex-direction:column;align-items:center;padding:20px;gap:20px;max-width:1100px;margin:0 auto}
@media(min-width:800px){.main{flex-direction:row;align-items:flex-start}}
.viewport{
  flex:1.2;min-width:300px;max-width:520px;width:100%;
  background:var(--panel);border:2px solid var(--border);border-radius:16px;
  padding:20px;display:flex;flex-direction:column;align-items:center;
  position:relative;overflow:visible;transition:background .4s;
}
.viewport svg{width:100%;max-height:520px;transition:opacity .3s}
.fun-btn{
  margin-top:14px;padding:11px 24px;background:var(--accent);color:#fff;
  border:none;border-radius:25px;font-size:14px;font-weight:700;
  cursor:pointer;transition:all .25s;letter-spacing:1px;
}
.fun-btn:hover{transform:scale(1.06);box-shadow:var(--glow)}
[data-theme="spartan"] .fun-btn{color:#000}
.controls{
  flex:1;min-width:260px;max-width:380px;width:100%;
  background:var(--panel);border:2px solid var(--border);border-radius:16px;padding:20px;
  transition:background .4s;max-height:80vh;overflow-y:auto;
}
.cg{margin-bottom:16px}
.cg label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);margin-bottom:8px}
.og{display:flex;flex-wrap:wrap;gap:5px}
.ob{
  padding:7px 13px;border:2px solid var(--border);background:var(--btn-bg);
  color:var(--text);font-size:12px;font-weight:600;border-radius:8px;
  cursor:pointer;transition:all .2s;
}
.ob:hover{background:var(--btn-hover)}
.ob.sel{background:var(--accent);color:#fff;border-color:var(--accent)}
[data-theme="spartan"] .ob.sel{color:#000}
.cr{display:flex;gap:10px;align-items:center;margin-bottom:6px}
.cr input[type="color"]{width:42px;height:32px;border:2px solid var(--border);border-radius:6px;cursor:pointer;background:transparent;padding:2px}
.cr span{font-size:12px;font-weight:600}
.xover-btn{
  display:block;width:100%;margin-top:18px;padding:14px;
  background:linear-gradient(135deg,#00d4ff,#ff69b4,#4a90d9,#ff6b35);
  background-size:300% 300%;animation:rbw 4s ease infinite;
  color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:800;
  cursor:pointer;letter-spacing:2px;text-shadow:0 1px 3px rgba(0,0,0,.3);
  transition:transform .2s;
}
.xover-btn:hover{transform:scale(1.03)}
@keyframes rbw{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.speech-bubble{
  position:absolute;background:#fff;color:#333;padding:10px 18px;
  border-radius:20px;font-size:15px;font-weight:800;
  box-shadow:0 4px 15px rgba(0,0,0,.15);animation:bpop .4s ease;
  pointer-events:none;z-index:10;max-width:280px;text-align:center;
}
.speech-bubble::after{content:'';position:absolute;bottom:-10px;left:50%;margin-left:-8px;border:10px solid transparent;border-top-color:#fff}
@keyframes bpop{0%{transform:scale(0) translateX(-50%);opacity:0}60%{transform:scale(1.15) translateX(-50%)}100%{transform:scale(1) translateX(-50%);opacity:1}}
@keyframes forReal{0%{transform:rotate(0deg) scale(1)}25%{transform:rotate(-5deg) scale(1.05)}50%{transform:rotate(5deg) scale(1.1)}75%{transform:rotate(-3deg) scale(1.05)}100%{transform:rotate(0deg) scale(1)}}
.shake{animation:forReal .6s ease}
@media(max-width:799px){
  .mode-btn{padding:9px 14px;font-size:13px}
  .mi{font-size:18px}
  .viewport,.controls{min-width:280px;max-width:100%}
}
</style>
</head>
<body data-theme="spartan">
<div class="title-bar">
  <h1>⚒️ MJOLNIR FORGE v5</h1>
  <div class="sub">Multi-Universe Character Customizer — For Dads Who Game</div>
</div>
<div class="header" id="modeBar"></div>
<div class="main">
  <div class="viewport" id="viewport"></div>
  <div class="controls" id="controls"></div>
</div>

<script>
const S={
  mode:'spartan',
  spartan:{helmet:'mark-vi',chest:'standard',shoulder:'standard',primary:'#5B7744',secondary:'#3D4F2F',visor:'#F4A500'},
  peppa:{dress:'#CC0000',accessory:'none',bg:'puddle'},
  bluey:{character:'bluey',outfit:'default',accessory:'none'},
  rachel:{outfit:'#FF6B35',accessory:'none',bg:'classroom'},
  crossover:null
};

function hex2rgb(h){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return{r,g,b}}
function rgb2hex(r,g,b){return'#'+[r,g,b].map(x=>Math.max(0,Math.min(255,Math.round(x))).toString(16).padStart(2,'0')).join('')}
function lighten(h,p){const c=hex2rgb(h);return rgb2hex(c.r+(255-c.r)*p/100,c.g+(255-c.g)*p/100,c.b+(255-c.b)*p/100)}
function darken(h,p){const c=hex2rgb(h);return rgb2hex(c.r*(1-p/100),c.g*(1-p/100),c.b*(1-p/100))}

const MODES=[
  {id:'spartan',icon:'⚔️',label:'SPARTAN'},
  {id:'peppa',icon:'🐷',label:'PEPPA'},
  {id:'bluey',icon:'🐶',label:'BLUEY'},
  {id:'rachel',icon:'👩‍🏫',label:'MISS RACHEL'}
];
function renderModeBar(){
  document.getElementById('modeBar').innerHTML=MODES.map(m=>
    '<button class="mode-btn'+(S.mode===m.id?' active':'')+'" onclick="setMode(\''+m.id+'\')"><span class="mi">'+m.icon+'</span>'+m.label+'</button>'
  ).join('');
}

function setMode(m){
  S.mode=m;S.crossover=null;
  document.body.dataset.theme=m;
  renderModeBar();render();renderControls();saveURL();
}

function saveURL(){try{history.replaceState(null,'','#'+btoa(JSON.stringify(S)))}catch(e){}}
function loadURL(){if(location.hash.length>1){try{Object.assign(S,JSON.parse(atob(location.hash.slice(1))))}catch(e){}}}

function svgFilters(){return '<defs>'+
  '<filter id="metallic" x="-5%" y="-5%" width="110%" height="110%">'+
    '<feGaussianBlur in="SourceAlpha" stdDeviation="1.5" result="a"/>'+
    '<feSpecularLighting in="a" surfaceScale="4" specularConstant="0.6" specularExponent="25" result="s">'+
      '<fePointLight x="250" y="50" z="300"/>'+
    '</feSpecularLighting>'+
    '<feComposite in="s" in2="SourceAlpha" operator="in" result="s2"/>'+
    '<feComposite in="SourceGraphic" in2="s2" operator="arithmetic" k1="0" k2="1" k3=".4" k4="0"/>'+
  '</filter>'+
  '<filter id="vglow" x="-30%" y="-30%" width="160%" height="160%">'+
    '<feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>'+
    '<feColorMatrix in="b" type="saturate" values="3" result="s"/>'+
    '<feMerge><feMergeNode in="s"/><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge>'+
  '</filter>'+
  '<filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">'+
    '<feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity=".15"/>'+
  '</filter>'+
'</defs>'}

// ═══════════ SPARTAN ═══════════
function renderSpartan(){
  var h=S.spartan.helmet,ch=S.spartan.chest,sh=S.spartan.shoulder;
  var pc=S.spartan.primary,sc=S.spartan.secondary,vc=S.spartan.visor;
  var pcL=lighten(pc,15),pcD=darken(pc,20),scD=darken(sc,15);
  var cross=S.crossover;
  return '<svg viewBox="0 0 400 620" xmlns="http://www.w3.org/2000/svg">'+
svgFilters()+
'<defs>'+
  '<linearGradient id="ag" x1="0" y1="0" x2=".3" y2="1">'+
    '<stop offset="0%" stop-color="'+pcL+'"/><stop offset="50%" stop-color="'+pc+'"/><stop offset="100%" stop-color="'+pcD+'"/>'+
  '</linearGradient>'+
  '<linearGradient id="ag2" x1="0" y1="0" x2=".3" y2="1">'+
    '<stop offset="0%" stop-color="'+lighten(sc,10)+'"/><stop offset="50%" stop-color="'+sc+'"/><stop offset="100%" stop-color="'+scD+'"/>'+
  '</linearGradient>'+
  '<linearGradient id="vg" x1="0" y1="0" x2="0" y2="1">'+
    '<stop offset="0%" stop-color="'+lighten(vc,40)+'"/><stop offset="40%" stop-color="'+vc+'"/><stop offset="100%" stop-color="'+darken(vc,30)+'"/>'+
  '</linearGradient>'+
'</defs>'+

'<g fill="url(#ag2)">'+
  '<path d="M 178,148 L 222,148 L 225,170 L 175,170 Z"/>'+
  '<rect x="130" y="185" width="14" height="100" rx="5"/>'+
  '<rect x="256" y="185" width="14" height="100" rx="5"/>'+
  '<path d="M 155,320 L 245,320 L 250,345 L 150,345 Z"/>'+
  '<rect x="185" y="350" width="30" height="60" rx="4"/>'+
'</g>'+

'<g filter="url(#metallic)">'+
  '<path d="M 152,340 C 148,345 140,360 138,400 L 138,430 C 138,435 142,438 155,440 L 180,440 C 188,438 192,435 192,430 L 192,360 C 192,350 188,345 182,342 Z" fill="url(#ag)"/>'+
  '<path d="M 248,340 C 252,345 260,360 262,400 L 262,430 C 262,435 258,438 245,440 L 220,440 C 212,438 208,435 208,430 L 208,360 C 208,350 212,345 218,342 Z" fill="url(#ag)"/>'+
  '<path d="M 135,442 C 132,450 128,480 126,520 L 126,550 C 126,558 132,562 150,564 L 178,564 C 190,562 194,558 194,550 L 194,480 C 194,460 192,448 190,442 Z" fill="url(#ag)"/>'+
  '<path d="M 265,442 C 268,450 272,480 274,520 L 274,550 C 274,558 268,562 250,564 L 222,564 C 210,562 206,558 206,550 L 206,480 C 206,460 208,448 210,442 Z" fill="url(#ag)"/>'+
  '<path d="M 122,556 L 196,556 L 198,580 L 200,595 C 200,600 195,605 180,605 L 125,605 C 115,605 112,600 112,595 L 112,580 C 112,568 115,560 122,556 Z" fill="'+pcD+'"/>'+
  '<path d="M 204,556 L 278,556 L 280,580 L 282,595 C 282,600 277,605 262,605 L 210,605 C 200,605 198,600 198,595 L 198,580 C 198,568 202,560 204,556 Z" fill="'+pcD+'"/>'+
  '<ellipse cx="162" cy="442" rx="22" ry="14" fill="'+pcL+'"/>'+
  '<ellipse cx="238" cy="442" rx="22" ry="14" fill="'+pcL+'"/>'+
  '<path d="M 152,370 L 182,370" stroke="'+pcD+'" stroke-width="2" fill="none"/>'+
  '<path d="M 218,370 L 248,370" stroke="'+pcD+'" stroke-width="2" fill="none"/>'+
  '<path d="M 150,395 L 185,395" stroke="'+pcD+'" stroke-width="2" fill="none"/>'+
  '<path d="M 215,395 L 250,395" stroke="'+pcD+'" stroke-width="2" fill="none"/>'+
'</g>'+

'<path d="M 148,330 L 252,330 L 258,348 C 258,355 240,360 200,362 C 160,360 142,355 142,348 Z" fill="'+pcD+'" filter="url(#metallic)"/>'+
'<path d="M 175,332 L 225,332 L 222,355 C 215,358 200,360 200,360 C 200,360 185,358 178,355 Z" fill="'+sc+'" opacity=".6"/>'+

'<path d="M 145,168 C 135,172 125,178 120,190 L 115,260 C 115,290 125,320 140,330 L 155,336 L 200,340 L 245,336 L 260,330 C 275,320 285,290 285,260 L 280,190 C 275,178 265,172 255,168 Z" fill="url(#ag)" filter="url(#metallic)"/>'+

spartanChest(ch,pc,sc,pcD,pcL)+

'<g filter="url(#metallic)">'+
  '<path d="M 120,188 C 112,195 105,210 100,240 L 95,285 C 95,292 100,296 110,298 L 128,298 C 135,296 140,292 140,285 L 140,210 C 140,198 135,192 130,188 Z" fill="url(#ag)"/>'+
  '<path d="M 280,188 C 288,195 295,210 300,240 L 305,285 C 305,292 300,296 290,298 L 272,298 C 265,296 260,292 260,285 L 260,210 C 260,198 265,192 270,188 Z" fill="url(#ag)"/>'+
  '<path d="M 92,300 C 88,310 82,340 78,370 L 76,400 C 76,408 82,412 95,414 L 118,414 C 128,412 134,408 134,400 L 136,340 C 136,320 134,308 132,300 Z" fill="url(#ag)"/>'+
  '<path d="M 308,300 C 312,310 318,340 322,370 L 324,400 C 324,408 318,412 305,414 L 282,414 C 272,412 266,408 266,400 L 264,340 C 264,320 266,308 268,300 Z" fill="url(#ag)"/>'+
  '<path d="M 74,410 L 130,410 L 132,432 C 132,440 124,445 102,445 L 82,445 C 72,445 68,440 68,432 Z" fill="'+scD+'"/>'+
  '<path d="M 270,410 L 326,410 L 328,432 C 328,440 320,445 298,445 L 278,445 C 268,445 264,440 264,432 Z" fill="'+scD+'"/>'+
  '<ellipse cx="112" cy="300" rx="18" ry="12" fill="'+pcL+'"/>'+
  '<ellipse cx="288" cy="300" rx="18" ry="12" fill="'+pcL+'"/>'+
'</g>'+

spartanShoulders(sh,pc,sc,pcL,pcD)+
spartanHelmet(h,pc,sc,vc,pcL,pcD)+

(cross==='peppa-tail'?'<path d="M 310,300 C 320,280 340,260 335,240 C 330,220 340,210 338,195" stroke="#FFB6C1" stroke-width="6" fill="none" stroke-linecap="round"/>':
 cross==='bluey-ears'?'<ellipse cx="140" cy="60" rx="22" ry="45" fill="#5BA4CF" transform="rotate(-15 140 60)"/><ellipse cx="260" cy="60" rx="22" ry="45" fill="#5BA4CF" transform="rotate(15 260 60)"/>':
 cross==='rachel-mic'?'<g transform="translate(315,350)"><rect x="-5" y="-40" width="10" height="45" rx="4" fill="#333"/><circle cx="0" cy="-45" r="12" fill="#555"/><circle cx="0" cy="-45" r="8" fill="#888"/></g>':'')+

'</svg>'+
'<button class="fun-btn" onclick="spartanQuip()">⚔️ "FINISHING THIS FIGHT"</button>';
}

function spartanChest(type,pc,sc,pcD,pcL){
  var base='<path d="M 165,190 L 200,185 L 235,190 L 238,250 L 235,290 C 225,300 200,305 200,305 C 200,305 175,300 165,290 L 162,250 Z" fill="'+pcL+'" opacity=".35"/>';
  if(type==='tactical')return base+
    '<path d="M 180,200 L 200,195 L 220,200 L 222,240 L 200,245 L 178,240 Z" fill="'+pcD+'" opacity=".5"/>'+
    '<line x1="200" y1="195" x2="200" y2="290" stroke="'+pcD+'" stroke-width="2"/>'+
    '<line x1="170" y1="230" x2="230" y2="230" stroke="'+pcD+'" stroke-width="1.5"/>'+
    '<line x1="172" y1="260" x2="228" y2="260" stroke="'+pcD+'" stroke-width="1.5"/>'+
    '<circle cx="200" cy="215" r="8" fill="'+sc+'" opacity=".4"/>';
  if(type==='commando')return base+
    '<path d="M 175,200 L 225,200 L 230,260 L 200,280 L 170,260 Z" fill="'+pcD+'" opacity=".4"/>'+
    '<path d="M 190,205 L 210,205 L 212,250 L 200,260 L 188,250 Z" fill="'+sc+'" opacity=".5"/>'+
    '<circle cx="200" cy="225" r="6" fill="'+pcL+'" opacity=".6"/>'+
    '<line x1="175" y1="240" x2="190" y2="240" stroke="'+pcD+'" stroke-width="2"/>'+
    '<line x1="210" y1="240" x2="225" y2="240" stroke="'+pcD+'" stroke-width="2"/>';
  if(type==='heavy')return base+
    '<path d="M 158,195 L 200,188 L 242,195 L 245,270 L 200,295 L 155,270 Z" fill="'+pcD+'" opacity=".45"/>'+
    '<rect x="185" y="200" width="30" height="60" rx="4" fill="'+sc+'" opacity=".4"/>'+
    '<rect x="165" y="210" width="15" height="40" rx="3" fill="'+sc+'" opacity=".3"/>'+
    '<rect x="220" y="210" width="15" height="40" rx="3" fill="'+sc+'" opacity=".3"/>'+
    '<path d="M 180,275 L 200,285 L 220,275" stroke="'+pcL+'" stroke-width="2" fill="none"/>';
  return base+
    '<line x1="200" y1="195" x2="200" y2="295" stroke="'+pcD+'" stroke-width="2.5" opacity=".5"/>'+
    '<path d="M 175,220 L 200,210 L 225,220" stroke="'+pcD+'" stroke-width="2" fill="none" opacity=".5"/>'+
    '<circle cx="200" cy="250" r="5" fill="'+sc+'" opacity=".4"/>';
}

function spartanShoulders(type,pc,sc,pcL,pcD){
  var baseL='<path d="M 140,170 C 125,165 95,168 85,178 L 82,205 C 84,215 95,220 115,218 L 140,210 Z" fill="url(#ag)" filter="url(#metallic)"/>';
  var baseR='<path d="M 260,170 C 275,165 305,168 315,178 L 318,205 C 316,215 305,220 285,218 L 260,210 Z" fill="url(#ag)" filter="url(#metallic)"/>';
  if(type==='gungnir')return baseL+baseR+
    '<rect x="80" y="178" width="50" height="8" rx="3" fill="'+pcD+'"/>'+
    '<rect x="270" y="178" width="50" height="8" rx="3" fill="'+pcD+'"/>'+
    '<rect x="85" y="192" width="42" height="8" rx="3" fill="'+pcD+'"/>'+
    '<rect x="273" y="192" width="42" height="8" rx="3" fill="'+pcD+'"/>';
  if(type==='security')return(
    '<path d="M 140,170 C 118,162 80,165 70,180 L 65,215 C 65,228 78,235 100,232 L 140,218 Z" fill="url(#ag)" filter="url(#metallic)"/>'+
    '<path d="M 260,170 C 282,162 320,165 330,180 L 335,215 C 335,228 322,235 300,232 L 260,218 Z" fill="url(#ag)" filter="url(#metallic)"/>'+
    '<circle cx="100" cy="195" r="10" fill="'+pcD+'" opacity=".5"/>'+
    '<circle cx="300" cy="195" r="10" fill="'+pcD+'" opacity=".5"/>');
  if(type==='hayabusa')return baseL+baseR+
    '<path d="M 82,175 L 70,190 L 85,205" stroke="'+pcL+'" stroke-width="3" fill="none"/>'+
    '<path d="M 318,175 L 330,190 L 315,205" stroke="'+pcL+'" stroke-width="3" fill="none"/>'+
    '<path d="M 90,185 L 78,198" stroke="'+pcL+'" stroke-width="2" fill="none"/>'+
    '<path d="M 310,185 L 322,198" stroke="'+pcL+'" stroke-width="2" fill="none"/>';
  return baseL+baseR+
    '<path d="M 88,188 L 110,188" stroke="'+pcD+'" stroke-width="2"/>'+
    '<path d="M 290,188 L 312,188" stroke="'+pcD+'" stroke-width="2"/>';
}

function spartanHelmet(type,pc,sc,vc,pcL,pcD){
  var sh=function(d){return '<path d="'+d+'" fill="url(#ag)" filter="url(#metallic)"/>'};
  var vi=function(d){return '<path d="'+d+'" fill="url(#vg)" filter="url(#vglow)"/>'};
  if(type==='mark-v')
    return sh('M 158,140 C 155,130 152,105 155,80 C 158,60 172,42 200,38 C 228,42 242,60 245,80 C 248,105 245,130 242,140 L 238,150 C 230,156 215,160 200,160 C 185,160 170,156 162,150 Z')+

function jumpInPuddles(){

var BABY_WORDS=["MAMA","DADA","BALL","DOG","CAT","BABY","HI","BYE BYE","MORE","MILK","WATER","UP","PLEASE","THANK YOU","HAPPY","LOVE","STAR","MOON","FISH","DUCK"];
function sayItWithMe(){
  var container=document.getElementById('rachelBubbles');
  if(!container)return;
  var words=[];
  for(var i=0;i<3;i++){
    var w=BABY_WORDS[Math.floor(Math.random()*BABY_WORDS.length)];
    var x=80+Math.random()*240,y=50+i*45+Math.random()*20;
    var colors=['#E53935','#1E88E5','#43A047','#FB8C00','#8E24AA','#00ACC1'];
    var c=colors[Math.floor(Math.random()*colors.length)];
    words.push('<g><rect x="'+(x-30)+'" y="'+(y-18)+'" width="'+(w.length*12+20)+'" height="32" rx="16" fill="'+c+'" opacity=".9"><animate attributeName="opacity" from="0" to=".9" dur="0.3s" begin="'+i*0.2+'s" fill="freeze"/></rect><text x="'+(x+w.length*6-20)+'" y="'+(y+5)+'" text-anchor="middle" fill="#fff" font-size="16" font-weight="800" opacity="0">'+w+'!<animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="'+i*0.2+'s" fill="freeze"/></text></g>');
  }
  container.innerHTML=words.join('');
  setTimeout(function(){container.innerHTML=''},2500);
  showBubble("Can you say... "+BABY_WORDS[Math.floor(Math.random()*BABY_WORDS.length)]+"? 🎉");
}

// ═══════════ CROSSOVER ═══════════
var CROSSOVERS={
  spartan:['peppa-tail','bluey-ears','rachel-mic'],
  peppa:['spartan-helmet'],
  bluey:['spartan-chest','peppa-dress'],
  rachel:['spartan-helmet']
};

function doCrossover(){
  var opts=CROSSOVERS[S.mode]||[];
  if(!opts.length)return;
  var pick=opts[Math.floor(Math.random()*opts.length)];
  S.crossover=S.crossover===pick?null:pick;
  render();
  if(S.crossover){
    var msgs={
      'peppa-tail':'Spartans are tactical... and FABULOUS.',
      'bluey-ears':'Floppy ears improve helmet aerodynamics by 0%.',
      'rachel-mic':'Master Chief, can you say... MAMA?',
      'spartan-helmet':'Tactical visor: ENGAGED. Oink.',
      'spartan-chest':'Bluey has +50 armor. Still a good girl.',
      'peppa-dress':"It's not a dress. It's TACTICAL FASHION."
    };
    showBubble(msgs[pick]||'CROSSOVER ACTIVATED!');
  }
}

// ═══════════ SPEECH BUBBLES ═══════════
var bubbleTimer=null;
function showBubble(text){
  var vp=document.getElementById('viewport');
  var old=vp.querySelector('.speech-bubble');
  if(old)old.remove();
  clearTimeout(bubbleTimer);
  var b=document.createElement('div');
  b.className='speech-bubble';
  b.textContent=text;
  b.style.top='10px';
  b.style.left='50%';
  b.style.transform='translateX(-50%)';
  vp.appendChild(b);
  bubbleTimer=setTimeout(function(){b.remove()},3000);
}

// ═══════════ INIT ═══════════
function render(){
  var vp=document.getElementById('viewport');
  switch(S.mode){
    case 'spartan':vp.innerHTML=renderSpartan();break;
    case 'peppa':vp.innerHTML=renderPeppa();break;
    case 'bluey':vp.innerHTML=renderBluey();break;
    case 'rachel':vp.innerHTML=renderRachel();break;
  }
}

loadURL();
renderModeBar();
