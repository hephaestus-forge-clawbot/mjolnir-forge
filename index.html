<!DOCTYPE html>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Courier New',monospace;color:#ccc;-webkit-tap-highlight-color:transparent}
canvas{display:block;width:100%;height:100%;position:fixed;top:0;left:0}

#title-bar{position:fixed;top:0;left:0;right:0;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(180deg,rgba(5,5,15,0.92) 0%,rgba(5,5,15,0) 100%);z-index:20}
#title-bar h1{font-size:clamp(14px,3vw,22px);letter-spacing:6px;color:#00d4ff;text-shadow:0 0 10px #00d4ff,0 0 30px rgba(0,212,255,0.3);font-weight:700}
#loadout-summary{font-size:11px;color:#5a6a7a;letter-spacing:2px;text-align:right;max-width:40%}
#action-bar{position:fixed;top:52px;right:15px;display:flex;flex-direction:column;gap:8px;z-index:20}
.action-btn{background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.25);color:#00d4ff;padding:8px 12px;cursor:pointer;border-radius:4px;font-size:12px;font-family:'Courier New',monospace;letter-spacing:1px;transition:all .2s;white-space:nowrap}
.action-btn:hover{background:rgba(0,212,255,0.2);box-shadow:0 0 15px rgba(0,212,255,0.3);border-color:#00d4ff}
#bottom-panel{position:fixed;bottom:0;left:0;right:0;background:rgba(8,8,18,0.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid rgba(0,212,255,0.2);z-index:20;transition:transform .35s cubic-bezier(.4,0,.2,1);max-height:50vh;display:flex;flex-direction:column}

#panel-toggle{display:none;width:100%;background:transparent;border:none;border-bottom:1px solid rgba(0,212,255,0.1);color:#00d4ff;font-family:'Courier New',monospace;font-size:12px;letter-spacing:3px;padding:10px;cursor:pointer;text-align:center}
#panel-tabs{display:flex;gap:0;border-bottom:1px solid rgba(0,212,255,0.1);flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
#panel-tabs::-webkit-scrollbar{display:none}
.tab{background:transparent;border:none;border-bottom:2px solid transparent;color:#556;padding:10px 18px;cursor:pointer;font-family:'Courier New',monospace;font-size:11px;letter-spacing:2px;transition:all .2s;white-space:nowrap;flex-shrink:0}
.tab:hover{color:#99a}
.tab.active{color:#00d4ff;border-bottom-color:#00d4ff}
#panel-content{padding:14px 18px;overflow-y:auto;overflow-x:hidden;flex:1;scrollbar-width:thin;scrollbar-color:rgba(0,212,255,0.2) transparent}
#panel-content::-webkit-scrollbar{width:4px}

.options-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px}
.option-btn{background:rgba(15,15,30,0.8);border:1px solid rgba(0,212,255,0.12);color:#99a;padding:10px 12px;cursor:pointer;border-radius:4px;font-size:12px;font-family:'Courier New',monospace;transition:all .2s;text-align:center}
.option-btn:hover{border-color:rgba(0,212,255,0.4);color:#ccd;background:rgba(0,212,255,0.06)}

.color-section{display:flex;flex-wrap:wrap;gap:14px;align-items:flex-start}

.preset-btn:hover{border-color:rgba(0,212,255,0.4);color:#ccd;background:rgba(0,212,255,0.06)}
.id-section{display:flex;flex-wrap:wrap;gap:14px;align-items:flex-end}

.id-group input[type=text]{width:80px;background:rgba(10,10,20,0.8);border:1px solid rgba(0,212,255,0.2);color:#00d4ff;padding:6px 8px;border-radius:4px;font-family:'Courier New',monospace;font-size:14px;letter-spacing:3px;text-transform:uppercase}
.id-group input[type=text]:focus{outline:none;border-color:#00d4ff;box-shadow:0 0 10px rgba(0,212,255,0.2)}
#name-display{font-size:12px;color:#00d4ff;letter-spacing:2px;padding:6px 0}
.gen-btn{background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.25);color:#00d4ff;padding:6px 12px;cursor:pointer;border-radius:4px;font-size:11px;font-family:'Courier New',monospace;transition:all .2s}
.gen-btn:hover{background:rgba(0,212,255,0.2)}
#toast{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-100px);background:rgba(0,212,255,0.15);border:1px solid rgba(0,212,255,0.4);color:#00d4ff;padding:10px 24px;border-radius:6px;font-size:12px;letter-spacing:2px;transition:transform .4s cubic-bezier(.4,0,.2,1);z-index:100;pointer-events:none;backdrop-filter:blur(8px)}
#toast.show{transform:translateX(-50%) translateY(0)}
@media(max-width:768px){
#panel-toggle{display:block}

<script>
// Inline OrbitControls
THREE.OrbitControls=function(camera,domElement){
this.camera=camera;this.domElement=domElement;this.target=new THREE.Vector3();
this.enableDamping=true;this.dampingFactor=0.08;this.rotateSpeed=0.8;this.zoomSpeed=1;
this.minDistance=2;this.maxDistance=10;this.minPolarAngle=0.3;this.maxPolarAngle=Math.PI/2+0.3;
this.autoRotate=false;this.autoRotateSpeed=1.0;this.enabled=true;
var scope=this,spherical=new THREE.Spherical(),sphericalDelta=new THREE.Spherical(),
scale=1,panOffset=new THREE.Vector3(),rotateStart=new THREE.Vector2(),
rotateEnd=new THREE.Vector2(),state=0,pointers=[],pointerPositions={};
var offset=new THREE.Vector3(),quat=new THREE.Quaternion().setFromUnitVectors(
camera.up,new THREE.Vector3(0,1,0)),quatInverse=quat.clone().invert();
function getAutoRotationAngle(){return 2*Math.PI/60/60*scope.autoRotateSpeed}
function getZoomScale(){return Math.pow(0.95,scope.zoomSpeed)}
this.update=function(){
var position=scope.camera.position;offset.copy(position).sub(scope.target);
offset.applyQuaternion(quat);spherical.setFromVector3(offset);
if(scope.autoRotate&&state===0)sphericalDelta.theta-=getAutoRotationAngle();
if(scope.enableDamping){spherical.theta+=sphericalDelta.theta*scope.dampingFactor;
spherical.phi+=sphericalDelta.phi*scope.dampingFactor;}
else{spherical.theta+=sphericalDelta.theta;spherical.phi+=sphericalDelta.phi;}
spherical.phi=Math.max(scope.minPolarAngle,Math.min(scope.maxPolarAngle,spherical.phi));
spherical.makeSafe();spherical.radius*=scale;
spherical.radius=Math.max(scope.minDistance,Math.min(scope.maxDistance,spherical.radius));
scope.target.add(panOffset);offset.setFromSpherical(spherical);
offset.applyQuaternion(quatInverse);position.copy(scope.target).add(offset);
scope.camera.lookAt(scope.target);
if(scope.enableDamping){sphericalDelta.theta*=(1-scope.dampingFactor);
sphericalDelta.phi*=(1-scope.dampingFactor);panOffset.multiplyScalar(1-scope.dampingFactor);}
else{sphericalDelta.set(0,0,0);panOffset.set(0,0,0);}scale=1;return false;};
function onPointerDown(e){if(!scope.enabled)return;if(pointers.length===0)
scope.domElement.setPointerCapture(e.pointerId);addPointer(e);
if(e.pointerType==='touch'){onTouchStart(e);}else{
rotateStart.set(e.clientX,e.clientY);state=1;}}
function onPointerMove(e){if(!scope.enabled)return;
if(e.pointerType==='touch'){onTouchMove(e);}else{if(state!==1)return;
rotateEnd.set(e.clientX,e.clientY);var el=scope.domElement;
sphericalDelta.theta-=2*Math.PI*(rotateEnd.x-rotateStart.x)/el.clientHeight*scope.rotateSpeed;
sphericalDelta.phi-=2*Math.PI*(rotateEnd.y-rotateStart.y)/el.clientHeight*scope.rotateSpeed;
rotateStart.copy(rotateEnd);}}
function onPointerUp(e){removePointer(e);if(pointers.length===0){
scope.domElement.releasePointerCapture(e.pointerId);state=0;}}
function onWheel(e){if(!scope.enabled)return;e.preventDefault();
if(e.deltaY<0)scale/=getZoomScale();else if(e.deltaY>0)scale*=getZoomScale();}
var touchStartDist=0;
function onTouchStart(e){trackPointer(e);if(pointers.length===1){
rotateStart.set(e.clientX,e.clientY);state=1;}
else if(pointers.length===2){var p1=pointerPositions[pointers[0]],p2=pointerPositions[pointers[1]];
if(!p1||!p2)return;touchStartDist=Math.sqrt((p1.x-p2.x)**2+(p1.y-p2.y)**2);
rotateStart.set((p1.x+p2.x)/2,(p1.y+p2.y)/2);state=3;}}
function onTouchMove(e){trackPointer(e);if(state===1&&pointers.length===1){
rotateEnd.set(e.clientX,e.clientY);var el=scope.domElement;
sphericalDelta.theta-=2*Math.PI*(rotateEnd.x-rotateStart.x)/el.clientHeight*scope.rotateSpeed;
sphericalDelta.phi-=2*Math.PI*(rotateEnd.y-rotateStart.y)/el.clientHeight*scope.rotateSpeed;
rotateStart.copy(rotateEnd);}
else if(state===3&&pointers.length===2){var p1=pointerPositions[pointers[0]],p2=pointerPositions[pointers[1]];
if(!p1||!p2)return;var dist=Math.sqrt((p1.x-p2.x)**2+(p1.y-p2.y)**2);
scale*=touchStartDist/dist;touchStartDist=dist;
var mid={x:(p1.x+p2.x)/2,y:(p1.y+p2.y)/2};rotateEnd.set(mid.x,mid.y);var el=scope.domElement;
sphericalDelta.theta-=2*Math.PI*(rotateEnd.x-rotateStart.x)/el.clientHeight*scope.rotateSpeed*0.5;
sphericalDelta.phi-=2*Math.PI*(rotateEnd.y-rotateStart.y)/el.clientHeight*scope.rotateSpeed*0.5;
rotateStart.copy(rotateEnd);}}
function addPointer(e){pointers.push(e.pointerId)}
function removePointer(e){pointers=pointers.filter(function(p){return p!==e.pointerId});delete pointerPositions[e.pointerId];}
function trackPointer(e){var p=pointerPositions[e.pointerId];
if(!p){p=new THREE.Vector2();pointerPositions[e.pointerId]=p;}p.set(e.clientX,e.clientY);}
domElement.addEventListener('pointerdown',onPointerDown);
domElement.addEventListener('pointermove',onPointerMove);
domElement.addEventListener('pointerup',onPointerUp);
domElement.addEventListener('wheel',onWheel,{passive:false});
domElement.addEventListener('contextmenu',function(e){e.preventDefault()});
domElement.style.touchAction='none';};

// === CONSTANTS ===
var VISOR_COLORS={
gold:{color:0xffd700,emissive:0xffa500},blue:{color:0x4488ff,emissive:0x2244cc},

var HELMET_NAMES=['mark-v','mark-vi','eva','recon','odst','hayabusa','cqb','security'];
var HELMET_LABELS={'mark-v':'MARK V','mark-vi':'MARK VI','eva':'EVA','recon':'RECON',
'odst':'ODST','hayabusa':'HAYABUSA','cqb':'CQB','security':'SECURITY'};
var CHEST_NAMES=['default','tactical','assault','recon','grenadier'];
var CHEST_LABELS={'default':'DEFAULT','tactical':'TACTICAL','assault':'ASSAULT',
'recon':'RECON','grenadier':'GRENADIER'};
var SHOULDER_NAMES=['default','security','odst','mark-v','gungnir'];
var SHOULDER_LABELS={'default':'DEFAULT','security':'SECURITY','odst':'ODST',
'mark-v':'MARK V','gungnir':'GUNGNIR'};
var PRESETS={
'noble-six':{name:'NOBLE SIX',tag:'B312',helmet:'mark-v',chest:'default',shoulders:'default',
primary:'#7b8b8d',secondary:'#3a3a4a',visor:'gold'},

'carter':{name:'CARTER-A259',tag:'A259',helmet:'mark-v',chest:'default',shoulders:'mark-v',

'jun':{name:'JUN-A266',tag:'A266',helmet:'odst',chest:'recon',shoulders:'gungnir',
primary:'#5a7a4a',secondary:'#3a4a3a',visor:'green'},
'master-chief':{name:'MASTER CHIEF',tag:'117',helmet:'mark-vi',chest:'default',shoulders:'default',
primary:'#6a8a3a',secondary:'#4a5a3a',visor:'gold'}};
var SPARTAN_NAMES=['GHOST','HAMMER','PHOENIX','SHADOW','VIPER','SENTINEL','GUARDIAN','STORM',
'THUNDER','ANVIL','CRUCIBLE','EMBER','IRON','STEEL','OBSIDIAN','GRANITE','VECTOR','CIPHER',
'ATLAS','TITAN','REAPER','VALKYRIE','ROGUE','HAVOC','WRAITH','ONYX','CRIMSON','AZURE',
'FALCON','WOLF','NOMAD','ORACLE','SPECTER','TALON','ZERO','NOVA','BLAZE','FROST',

var state={helmet:'mark-v',chest:'default',shoulders:'default',

// === GLOBALS ===
var scene,camera,renderer,controls,spartan,envMap;
var helmetGroup,chestGroup,shoulderLGroup,shoulderRGroup,bodyGroup;
var primaryMat,secondaryMat,undersuitMat,visorMat,visorGlowMat;
var labelSprite,labelCanvas,labelCtx,labelTexture;
var particles,particlePositions,particleVelocities;

var currentTab='helmet';

// === HELPERS ===
function addM(group,geom,mat,x,y,z,rx,ry,rz){
var mesh=new THREE.Mesh(geom,mat);
mesh.position.set(x||0,y||0,z||0);
if(rx)mesh.rotation.x=rx;if(ry)mesh.rotation.y=ry;if(rz)mesh.rotation.z=rz;
mesh.castShadow=true;mesh.receiveShadow=true;group.add(mesh);return mesh;}

// === INIT ===
function init(){
scene=new THREE.Scene();
scene.background=new THREE.Color(0x060610);
scene.fog=new THREE.FogExp2(0x060610,0.08);
camera=new THREE.PerspectiveCamera(40,window.innerWidth/window.innerHeight,0.1,100);
camera.position.set(0,2.0,5.0);
renderer=new THREE.WebGLRenderer({antialias:true,preserveDrawingBuffer:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.2;
renderer.outputEncoding=THREE.sRGBEncoding;
document.body.insertBefore(renderer.domElement,document.getElementById('ui'));
controls=new THREE.OrbitControls(camera,renderer.domElement);
controls.target.set(0,1.5,0);controls.enableDamping=true;controls.dampingFactor=0.08;
controls.minDistance=2.5;controls.maxDistance=8;controls.minPolarAngle=0.4;
controls.maxPolarAngle=Math.PI/2+0.2;controls.autoRotate=true;controls.autoRotateSpeed=0.8;
controls.update();
generateEnvMap();setupLighting();setupMaterials();createGround();createParticles();
spartan=new THREE.Group();scene.add(spartan);
buildBody();buildCurrentArmor();createLabel();loadFromURL();
switchTab('helmet');updateSummary();

if(window.innerWidth>768)document.getElementById('bottom-panel').classList.remove('collapsed');
animate();}

function generateEnvMap(){
var pmrem=new THREE.PMREMGenerator(renderer);pmrem.compileEquirectangularShader();
var es=new THREE.Scene();es.background=new THREE.Color(0x0a0a1a);
var l1=new THREE.DirectionalLight(0x4488cc,0.8);l1.position.set(2,3,1);es.add(l1);
var l2=new THREE.DirectionalLight(0x223355,0.4);l2.position.set(-2,1,-2);es.add(l2);
var l3=new THREE.DirectionalLight(0x112244,0.3);l3.position.set(0,-1,3);es.add(l3);
envMap=pmrem.fromScene(es,0.04).texture;pmrem.dispose();}

function setupLighting(){
scene.add(new THREE.AmbientLight(0x1a1a3a,0.6));
scene.add(new THREE.HemisphereLight(0x2a3a5a,0x0a0a15,0.4));
var main=new THREE.DirectionalLight(0xeeeeff,1.1);
main.position.set(3,6,4);main.castShadow=true;
main.shadow.mapSize.width=1024;main.shadow.mapSize.height=1024;
main.shadow.camera.near=0.5;main.shadow.camera.far=20;
main.shadow.camera.left=-3;main.shadow.camera.right=3;
main.shadow.camera.top=5;main.shadow.camera.bottom=-1;main.shadow.bias=-0.001;
scene.add(main);
var rim=new THREE.DirectionalLight(0x4488cc,0.6);rim.position.set(-3,3,-3);scene.add(rim);
var fill=new THREE.DirectionalLight(0x2244aa,0.25);fill.position.set(0,0,3);scene.add(fill);
visorLight=new THREE.PointLight(0xffa500,0.3,2);visorLight.position.set(0,2.65,0.3);scene.add(visorLight);}

function setupMaterials(){
undersuitMat=new THREE.MeshStandardMaterial({color:0x1a1a2e,metalness:0.3,roughness:0.85,envMap:envMap});
primaryMat=new THREE.MeshStandardMaterial({color:state.primaryColor,metalness:0.75,roughness:0.32,envMap:envMap,envMapIntensity:1.2});
secondaryMat=new THREE.MeshStandardMaterial({color:state.secondaryColor,metalness:0.6,roughness:0.5,envMap:envMap});
var vc=VISOR_COLORS[state.visor];
visorMat=new THREE.MeshStandardMaterial({color:vc.color,emissive:vc.emissive,emissiveIntensity:0.6,
metalness:0.95,roughness:0.05,envMap:envMap,envMapIntensity:2.0,transparent:true,opacity:0.85});
visorGlowMat=new THREE.MeshBasicMaterial({color:vc.emissive,transparent:true,opacity:0.12,
blending:THREE.AdditiveBlending,depthWrite:false,side:THREE.BackSide});}

function createGround(){
var c=document.createElement('canvas');c.width=1024;c.height=1024;
var ctx=c.getContext('2d');ctx.fillStyle='#08080f';ctx.fillRect(0,0,1024,1024);
ctx.strokeStyle='rgba(0,180,255,0.06)';ctx.lineWidth=1;
for(var i=0;i<=1024;i+=48){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,1024);ctx.stroke();
ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(1024,i);ctx.stroke();}
var grad=ctx.createRadialGradient(512,512,50,512,512,512);
grad.addColorStop(0,'rgba(0,0,0,0)');grad.addColorStop(0.7,'rgba(0,0,0,0.5)');grad.addColorStop(1,'rgba(0,0,0,1)');
ctx.fillStyle=grad;ctx.fillRect(0,0,1024,1024);

function createParticles(){

particlePositions[i*3+1]=Math.random()*4;
particlePositions[i*3+2]=(Math.random()-0.5)*5;
particleVelocities[i*3]=(Math.random()-0.5)*0.002;

particleVelocities[i*3+2]=(Math.random()-0.5)*0.002;}
var geom=new THREE.BufferGeometry();
geom.setAttribute('position',new THREE.BufferAttribute(particlePositions,3));
particles=new THREE.Points(geom,new THREE.PointsMaterial({
color:0x6699cc,size:0.025,transparent:true,opacity:0.35,
blending:THREE.AdditiveBlending,depthWrite:false,sizeAttenuation:true}));
scene.add(particles);}

addM(g,new THREE.BoxGeometry(0.24,0.06,0.24),primaryMat,s*0.6,2.42,0);
addM(g,new THREE.BoxGeometry(0.04,0.08,0.2),secondaryMat,s*0.68,2.36,0);
addM(g,new THREE.BoxGeometry(0.06,0.06,0.06),secondaryMat,s*0.58,2.3,0.08);
return g;}

function buildShoulder_odst(side){
var g=new THREE.Group(),s=side==='left'?-1:1;
addM(g,new THREE.SphereGeometry(0.12,10,8),primaryMat,s*0.57,2.34,0);
addM(g,new THREE.BoxGeometry(0.18,0.08,0.18),primaryMat,s*0.57,2.26,0);
addM(g,new THREE.BoxGeometry(0.04,0.1,0.1),secondaryMat,s*0.66,2.32,0);
return g;}

function buildShoulder_markV(side){
var g=new THREE.Group(),s=side==='left'?-1:1;
addM(g,new THREE.BoxGeometry(0.18,0.12,0.18),primaryMat,s*0.56,2.32,0);
addM(g,new THREE.BoxGeometry(0.16,0.04,0.04),secondaryMat,s*0.56,2.4,0);
addM(g,new THREE.BoxGeometry(0.04,0.04,0.16),secondaryMat,s*0.56,2.4,0);
addM(g,new THREE.BoxGeometry(0.2,0.03,0.03),secondaryMat,s*0.56,2.27,0.08);
return g;}

function buildShoulder_gungnir(side){
var g=new THREE.Group(),s=side==='left'?-1:1;
addM(g,new THREE.BoxGeometry(0.2,0.14,0.18),primaryMat,s*0.58,2.32,0);
addM(g,new THREE.CylinderGeometry(0.015,0.015,0.2,6),secondaryMat,s*0.68,2.46,0.04);
addM(g,new THREE.SphereGeometry(0.02,6,4),visorMat,s*0.68,2.56,0.04);
addM(g,new THREE.BoxGeometry(0.06,0.12,0.16),secondaryMat,s*0.66,2.3,0);
addM(g,new THREE.BoxGeometry(0.04,0.06,0.08),secondaryMat,s*0.5,2.3,0.06);
return g;}

var SHOULDER_BUILDERS={'default':buildShoulder_default,'security':buildShoulder_security,
'odst':buildShoulder_odst,'mark-v':buildShoulder_markV,'gungnir':buildShoulder_gungnir};

// === ARMOR ASSEMBLY ===
function buildCurrentArmor(){
if(helmetGroup)spartan.remove(helmetGroup);
if(chestGroup)spartan.remove(chestGroup);
if(shoulderLGroup)spartan.remove(shoulderLGroup);
if(shoulderRGroup)spartan.remove(shoulderRGroup);
helmetGroup=HELMET_BUILDERS[state.helmet]();
chestGroup=CHEST_BUILDERS[state.chest]();
shoulderLGroup=SHOULDER_BUILDERS[state.shoulders]('left');
shoulderRGroup=SHOULDER_BUILDERS[state.shoulders]('right');
spartan.add(helmetGroup);spartan.add(chestGroup);
spartan.add(shoulderLGroup);spartan.add(shoulderRGroup);}

function switchArmor(slot,value){
state[slot]=value;
if(slot==='helmet'){if(helmetGroup)spartan.remove(helmetGroup);
helmetGroup=HELMET_BUILDERS[value]();spartan.add(helmetGroup);}
else if(slot==='chest'){if(chestGroup)spartan.remove(chestGroup);
chestGroup=CHEST_BUILDERS[value]();spartan.add(chestGroup);}
else if(slot==='shoulders'){
if(shoulderLGroup)spartan.remove(shoulderLGroup);
if(shoulderRGroup)spartan.remove(shoulderRGroup);
shoulderLGroup=SHOULDER_BUILDERS[value]('left');
shoulderRGroup=SHOULDER_BUILDERS[value]('right');
spartan.add(shoulderLGroup);spartan.add(shoulderRGroup);}
updateSummary();renderActiveButtons();}

// === COLOR SYSTEM ===
function setPrimaryColor(hex){state.primaryColor=hex;primaryMat.color.set(hex);buildCurrentArmor();}
function setSecondaryColor(hex){state.secondaryColor=hex;secondaryMat.color.set(hex);buildCurrentArmor();}
function setVisorColor(name){
state.visor=name;var vc=VISOR_COLORS[name];
visorMat.color.set(vc.color);visorMat.emissive.set(vc.emissive);
visorGlowMat.color.set(vc.emissive);visorLight.color.set(vc.emissive);
buildCurrentArmor();updateSummary();renderActiveButtons();}

// === FLOATING LABEL ===
function createLabel(){
labelCanvas=document.createElement('canvas');labelCanvas.width=512;labelCanvas.height=128;
labelCtx=labelCanvas.getContext('2d');labelTexture=new THREE.CanvasTexture(labelCanvas);
labelTexture.minFilter=THREE.LinearFilter;
var sm=new THREE.SpriteMaterial({map:labelTexture,transparent:true,depthTest:false,depthWrite:false});
labelSprite=new THREE.Sprite(sm);labelSprite.scale.set(1.6,0.4,1);
labelSprite.position.set(0,3.3,0);spartan.add(labelSprite);updateLabel();}

function updateLabel(){
var ctx=labelCtx;ctx.clearRect(0,0,512,128);
ctx.font='bold 32px Courier New';ctx.fillStyle='#00d4ff';
ctx.textAlign='center';ctx.textBaseline='middle';
ctx.shadowColor='#00d4ff';ctx.shadowBlur=10;
ctx.fillText(state.spartanName,256,40);
ctx.font='bold 24px Courier New';ctx.fillStyle='#ffa500';
ctx.shadowColor='#ffa500';ctx.shadowBlur=8;
ctx.fillText('['+state.serviceTag+']',256,85);
ctx.shadowBlur=0;labelTexture.needsUpdate=true;}

// === UI ===
function switchTab(tab){
currentTab=tab;
document.querySelectorAll('.tab').forEach(function(t){
t.classList.toggle('active',t.dataset.tab===tab);});
renderTabContent(tab);}

function renderTabContent(tab){
var content=document.getElementById('panel-content');
if(tab==='helmet'){
content.innerHTML='<div class="options-grid">'+
HELMET_NAMES.map(function(h){return '<button class="option-btn '+(state.helmet===h?'active':'')+
'" onclick="switchArmor(\'helmet\',\''+h+'\')">'+HELMET_LABELS[h]+'</button>';}).join('')+'</div>';}
else if(tab==='chest'){
content.innerHTML='<div class="options-grid">'+
CHEST_NAMES.map(function(c){return '<button class="option-btn '+(state.chest===c?'active':'')+
'" onclick="switchArmor(\'chest\',\''+c+'\')">'+CHEST_LABELS[c]+'</button>';}).join('')+'</div>';}
else if(tab==='shoulders'){
content.innerHTML='<div class="options-grid">'+
SHOULDER_NAMES.map(function(s){return '<button class="option-btn '+(state.shoulders===s?'active':'')+
'" onclick="switchArmor(\'shoulders\',\''+s+'\')">'+SHOULDER_LABELS[s]+'</button>';}).join('')+'</div>';}
else if(tab==='colors'){
var visorHtml=Object.keys(VISOR_COLORS).map(function(v){
var c=VISOR_COLORS[v];var hex='#'+c.color.toString(16).padStart(6,'0');
return '<button class="visor-btn '+(state.visor===v?'active':'')+
'" style="background:'+hex+';color:'+hex+'" onclick="setVisorColor(\''+v+'\')" title="'+v.toUpperCase()+'"></button>';}).join('');
content.innerHTML='<div class="color-section">'+
'<div class="color-group"><label>Primary</label>'+
'<input type="color" value="'+state.primaryColor+'" onchange="setPrimaryColor(this.value)"></div>'+
'<div class="color-group"><label>Secondary</label>'+
'<input type="color" value="'+state.secondaryColor+'" onchange="setSecondaryColor(this.value)"></div>'+
'<div class="color-group"><label>Visor</label><div class="visor-colors">'+visorHtml+'</div></div></div>';}
else if(tab==='identity'){
content.innerHTML='<div class="id-section">'+
'<div class="id-group"><label>Service Tag</label>'+
'<input type="text" maxlength="4" value="'+state.serviceTag+'" oninput="updateServiceTag(this.value)"></div>'+
'<div class="id-group"><label>Spartan Name</label><div id="name-display">'+state.spartanName+'</div></div>'+
'<div class="id-group"><label>&nbsp;</label><button class="gen-btn" onclick="generateName()">&#9889; GENERATE</button></div></div>';}
else if(tab==='presets'){
content.innerHTML='<div class="presets-grid">'+
Object.keys(PRESETS).map(function(key){
return '<button class="preset-btn" onclick="applyPreset(\''+key+'\')">'+PRESETS[key].name+'</button>';}).join('')+'</div>';}}

function renderActiveButtons(){renderTabContent(currentTab);}

function updateServiceTag(val){
state.serviceTag=val.toUpperCase().replace(/[^A-Z0-9]/g,'').substring(0,4);updateLabel();}

function generateName(){
state.spartanName='SPARTAN-'+SPARTAN_NAMES[Math.floor(Math.random()*SPARTAN_NAMES.length)];
updateLabel();if(currentTab==='identity')renderTabContent('identity');}

function updateSummary(){
document.getElementById('loadout-summary').textContent=
HELMET_LABELS[state.helmet]+' / '+CHEST_LABELS[state.chest]+' / '+
SHOULDER_LABELS[state.shoulders]+' / '+state.visor.toUpperCase();}

function togglePanel(){
var panel=document.getElementById('bottom-panel');panel.classList.toggle('collapsed');
document.getElementById('panel-toggle').textContent=
panel.classList.contains('collapsed')?'\u25B2 CUSTOMIZE':'\u25BC HIDE';}

// === PRESETS ===
function applyPreset(key){
var p=PRESETS[key];state.helmet=p.helmet;state.chest=p.chest;state.shoulders=p.shoulders;
state.primaryColor=p.primary;state.secondaryColor=p.secondary;state.visor=p.visor;
state.spartanName=p.name;state.serviceTag=p.tag;
primaryMat.color.set(p.primary);secondaryMat.color.set(p.secondary);
var vc=VISOR_COLORS[p.visor];visorMat.color.set(vc.color);visorMat.emissive.set(vc.emissive);
visorGlowMat.color.set(vc.emissive);visorLight.color.set(vc.emissive);
buildCurrentArmor();updateLabel();updateSummary();renderActiveButtons();
showToast('PRESET: '+p.name);}

// === ACTIONS ===
function randomize(){
state.helmet=HELMET_NAMES[Math.floor(Math.random()*HELMET_NAMES.length)];
state.chest=CHEST_NAMES[Math.floor(Math.random()*CHEST_NAMES.length)];
state.shoulders=SHOULDER_NAMES[Math.floor(Math.random()*SHOULDER_NAMES.length)];
state.primaryColor='#'+Math.floor(Math.random()*0xffffff).toString(16).padStart(6,'0');
state.secondaryColor='#'+Math.floor(Math.random()*0x666666).toString(16).padStart(6,'0');
var vk=Object.keys(VISOR_COLORS);state.visor=vk[Math.floor(Math.random()*vk.length)];
state.spartanName='SPARTAN-'+SPARTAN_NAMES[Math.floor(Math.random()*SPARTAN_NAMES.length)];
state.serviceTag=String.fromCharCode(65+Math.floor(Math.random()*26))+
String(Math.floor(Math.random()*900+100));
primaryMat.color.set(state.primaryColor);secondaryMat.color.set(state.secondaryColor);
var vc=VISOR_COLORS[state.visor];visorMat.color.set(vc.color);visorMat.emissive.set(vc.emissive);
visorGlowMat.color.set(vc.emissive);visorLight.color.set(vc.emissive);
buildCurrentArmor();updateLabel();updateSummary();renderActiveButtons();showToast('RANDOMIZED');}

function shareURL(){
var params=new URLSearchParams({h:state.helmet,c:state.chest,s:state.shoulders,
v:state.visor,p:state.primaryColor.replace('#',''),sc:state.secondaryColor.replace('#',''),
tag:state.serviceTag,name:state.spartanName});
var url=window.location.origin+window.location.pathname+'?'+params.toString();
if(navigator.clipboard){navigator.clipboard.writeText(url).then(function(){showToast('LINK COPIED')});}
else{prompt('Share this URL:',url);}}

function exportPNG(){
var ui=document.getElementById('ui');ui.style.display='none';
renderer.render(scene,camera);
var link=document.createElement('a');
link.download='spartan-'+(state.serviceTag||'export')+'.png';
link.href=renderer.domElement.toDataURL('image/png');link.click();
ui.style.display='';showToast('EXPORTED');}

function resetAll(){applyPreset('noble-six');showToast('RESET');}

// === URL STATE ===
function loadFromURL(){
var p=new URLSearchParams(window.location.search);
if(p.has('h')&&HELMET_NAMES.indexOf(p.get('h'))>=0)state.helmet=p.get('h');
if(p.has('c')&&CHEST_NAMES.indexOf(p.get('c'))>=0)state.chest=p.get('c');
if(p.has('s')&&SHOULDER_NAMES.indexOf(p.get('s'))>=0)state.shoulders=p.get('s');
if(p.has('v')&&VISOR_COLORS[p.get('v')])state.visor=p.get('v');
if(p.has('p'))state.primaryColor='#'+p.get('p');
if(p.has('sc'))state.secondaryColor='#'+p.get('sc');
if(p.has('tag'))state.serviceTag=p.get('tag').toUpperCase().substring(0,4);
if(p.has('name'))state.spartanName=decodeURIComponent(p.get('name'));
primaryMat.color.set(state.primaryColor);secondaryMat.color.set(state.secondaryColor);
var vc=VISOR_COLORS[state.visor];visorMat.color.set(vc.color);visorMat.emissive.set(vc.emissive);
visorGlowMat.color.set(vc.emissive);visorLight.color.set(vc.emissive);
buildCurrentArmor();updateLabel();updateSummary();}

// === TOAST ===
var toastTimeout;
function showToast(msg){
var el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');
clearTimeout(toastTimeout);toastTimeout=setTimeout(function(){el.classList.remove('show')},2000);}

// === ANIMATION ===
function animate(){
requestAnimationFrame(animate);controls.update();
if(particles){
var pos=particles.geometry.attributes.position.array;
for(var i=0;i<pos.length;i+=3){
pos[i]+=particleVelocities[i];pos[i+1]+=particleVelocities[i+1];pos[i+2]+=particleVelocities[i+2];
if(pos[i+1]>4.5){pos[i]=(Math.random()-0.5)*5;pos[i+1]=-0.5;pos[i+2]=(Math.random()-0.5)*5;}}
particles.geometry.attributes.position.needsUpdate=true;}
if(visorLight)visorLight.intensity=0.25+Math.sin(Date.now()*0.003)*0.08;
renderer.render(scene,camera);}

function onResize(){
camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);}

// GO!
init();
</script>
</body>
</html>
